apis:
  - aid: shift4shop:shift4shop-rest-api
    name: Shift4Shop REST API
    description: RESTful web service for managing all aspects of a Shift4Shop online store including products, categories, orders, customers, coupons, and store configuration. Supports GET, POST, PUT, and DELETE HTTP methods. Authentication is via OAuth2 or application API keys managed through the Store Manager.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
